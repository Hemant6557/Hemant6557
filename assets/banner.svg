<svg width="1400" height="480" viewBox="0 0 1400 480" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="45%" stop-color="#0a1226"/>
      <stop offset="100%" stop-color="#0d1b33"/>
    </linearGradient>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2f4ff"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#7dd3fc" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1400" height="480" fill="url(#bgGrad)"/>
<rect width="1400" height="480" fill="url(#grid)"/>

<!-- Background Glow -->
<circle cx="1180" cy="110" r="280" fill="url(#glow)"/>
<circle cx="180" cy="390" r="240" fill="url(#glow)"/>

  <!-- Signature Data Pipeline: Raw Data → Power BI → AI -->
<g opacity="0.9">

  <path
    d="M 90 380 C 320 280, 460 270, 620 220 S 980 160, 1310 130"
    fill="none"
    stroke="url(#pipeGrad)"
    stroke-width="2.8"
    stroke-dasharray="1 9"
    stroke-linecap="round">

    <animate
      attributeName="stroke-dashoffset"
      from="0"
      to="-200"
      dur="6s"
      repeatCount="indefinite"/>
  </path>

  <circle r="6" fill="#7dd3fc">
    <animateMotion
      dur="6s"
      repeatCount="indefinite"
      path="M 90 330 C 320 280, 460 270, 620 220 S 980 160, 1310 130"/>
  </circle>

  <!-- Raw Data -->
  <g transform="translate(90,330)">
      <circle r="18"
              fill="#0d1b33"
              stroke="#2dd4bf"
              stroke-width="2.5"/>

      <circle r="5"
              fill="#2dd4bf"/>
  </g>

  <!-- Power BI -->
  <g transform="translate(620,200)">
      <circle r="20"
              fill="#0d1b33"
              stroke="#38bdf8"
              stroke-width="2.5"/>

      <rect x="-7" y="-3" width="4" height="10" fill="#38bdf8"/>
      <rect x="-1" y="-8" width="4" height="15" fill="#38bdf8"/>
      <rect x="5" y="0" width="4" height="7" fill="#38bdf8"/>
  </g>

  <!-- AI -->
  <g transform="translate(1310,110)">
      <circle r="22"
              fill="#0d1b33"
              stroke="#8b5cf6"
              stroke-width="2.5"/>

      <circle r="7"
              fill="none"
              stroke="#8b5cf6"
              stroke-width="2"/>

      <circle cx="0"
              cy="-7"
              r="2"
              fill="#c4b5fd">

          <animateTransform
              attributeName="transform"
              type="rotate"
              from="0 0 0"
              to="360 0 0"
              dur="4s"
              repeatCount="indefinite"/>
      </circle>
  </g>

</g>
<rect
x="70"
y="45"
width="780"
height="380"
rx="30"
fill="#38bdf8"
fill-opacity="0.05"
filter="url(#softBlur)"/>
 <!-- Glass Panel -->
<rect x="80" y="65" width="760" height="360" rx="28"
      fill="#ffffff"
      fill-opacity="0.04"
      stroke="#7dd3fc"
      stroke-opacity="0.28"
      stroke-width="1.2"/>

<rect x="80" y="65" width="700" height="2" rx="1"
      fill="#7dd3fc"
      fill-opacity="0.5"/>

<!-- Name -->
<text x="112"
      y="145"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="68"
      font-weight="700"
      fill="url(#nameGrad)">
    Hemant Kumar
</text>

<!-- Title -->
<text x="114"
      y="190"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="22"
      fill="#94a3b8"
      letter-spacing="0.5">
    Data &amp; Business Analyst • AI Automation Engineer
</text>
<line
x1="114"
y1="208"
x2="200"
y2="208"
stroke="#38bdf8"
stroke-width="2"/>
<!-- Description -->
<text x="114"
      y="230"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="16"
      fill="#94a3b8">
    Building AI-powered automation, Business Intelligence dashboards,
</text>

<text x="114"
      y="254"
      font-family="'Segoe UI', Arial, sans-serif"
      font-size="16"
      fill="#94a3b8">
    and intelligent workflow solutions for modern businesses.
</text>

  <!-- Python -->
<g font-family="'Cascadia Code','Fira Code',monospace" font-size="15" fill="#2dd4bf">
    <rect x="112" y="290" width="95" height="36" rx="18"
          fill="#2dd4bf" fill-opacity="0.1"
          stroke="#2dd4bf" stroke-opacity="0.4"/>
    <text x="132" y="314">Python</text>
</g>

<!-- SQL -->
<g font-family="'Cascadia Code','Fira Code',monospace" font-size="15" fill="#2dd4bf">
    <rect x="225" y="290" width="70" height="36" rx="18"
          fill="#2dd4bf" fill-opacity="0.1"
          stroke="#2dd4bf" stroke-opacity="0.4"/>
    <text x="243" y="314">SQL</text>
</g>

<!-- Power BI -->
<g font-family="'Cascadia Code','Fira Code',monospace" font-size="15" fill="#38bdf8">
    <rect x="325" y="290" width="120" height="36" rx="18"
          fill="#38bdf8" fill-opacity="0.1"
          stroke="#38bdf8" stroke-opacity="0.4"/>
    <text x="335" y="314">Power BI</text>
</g>

<!-- Gen AI -->
<g font-family="'Cascadia Code','Fira Code',monospace" font-size="15" fill="#8b5cf6">
    <rect x="470" y="290" width="105" height="36" rx="18"
          fill="#8b5cf6" fill-opacity="0.1"
          stroke="#8b5cf6" stroke-opacity="0.4"/>
    <text x="475" y="314">Gen AI</text>
</g>

<!-- LangChain -->
<g font-family="'Cascadia Code','Fira Code',monospace" font-size="15" fill="#f59e0b">
    <rect x="600" y="290" width="130" height="36" rx="18"
          fill="#f59e0b" fill-opacity="0.1"
          stroke="#f59e0b" stroke-opacity="0.4"/>
    <text x="597" y="314">LangChain</text>
</g>

  <text x="114" y="360" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#64748b">🚀 Currently Building AI Automation Platforms @ Virtue Analytics</text>
</svg>
