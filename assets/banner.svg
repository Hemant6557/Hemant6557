<svg width="1400" height="480" viewBox="0 0 1400 480" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="45%" stop-color="#0a1226"/>
      <stop offset="100%" stop-color="#0d1b33"/>
    </linearGradient>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2f4ff"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#7dd3fc" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1400" height="480" fill="url(#bgGrad)"/>
  <rect width="1400" height="480" fill="url(#grid)"/>

  <!-- Ambient glow -->
  <circle cx="300" cy="140" r="260" fill="url(#glow)"/>
  <circle cx="1100" cy="140" r="260" fill="url(#glow)"/>

  <!-- Card, stretched across almost the full banner width -->
  <rect x="40" y="55" width="1320" height="340" rx="30" fill="#38bdf8" fill-opacity="0.05" filter="url(#softBlur)"/>

  <!-- Glass panel -->
  <rect x="50" y="75" width="1300" height="320" rx="28"
        fill="#0a1226"
        fill-opacity="0.55"
        stroke="#7dd3fc"
        stroke-opacity="0.28"
        stroke-width="1.2"/>

  <!-- Name -->
  <text x="700" y="165" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="76" font-weight="700" fill="url(#nameGrad)">
    Hemant Kumar
  </text>

  <!-- Title -->
  <text x="700" y="205" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#94a3b8" letter-spacing="0.5">
    Data &amp; Business Analyst • AI Automation Engineer
  </text>

  <!-- Description -->
  <text x="700" y="240" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#94a3b8">
    Building AI-powered automation, Business Intelligence dashboards, and intelligent workflow solutions for modern businesses.
  </text>

  <!-- Skill pills, centered as a compact group -->
  <g font-family="'Cascadia Code','Fira Code',monospace" font-size="15" fill="#2dd4bf">
    <rect x="392" y="278" width="95" height="36" rx="18" fill="#2dd4bf" fill-opacity="0.1" stroke="#2dd4bf" stroke-opacity="0.4"/>
    <text x="439" y="301" text-anchor="middle">Python</text>
  </g>

  <g font-family="'Cascadia Code','Fira Code',monospace" font-size="15" fill="#2dd4bf">
    <rect x="511" y="278" width="70" height="36" rx="18" fill="#2dd4bf" fill-opacity="0.1" stroke="#2dd4bf" stroke-opacity="0.4"/>
    <text x="546" y="301" text-anchor="middle">SQL</text>
  </g>

  <g font-family="'Cascadia Code','Fira Code',monospace" font-size="15" fill="#38bdf8">
    <rect x="605" y="278" width="120" height="36" rx="18" fill="#38bdf8" fill-opacity="0.1" stroke="#38bdf8" stroke-opacity="0.4"/>
    <text x="665" y="301" text-anchor="middle">Power BI</text>
  </g>

  <g font-family="'Cascadia Code','Fira Code',monospace" font-size="15" fill="#8b5cf6">
    <rect x="749" y="278" width="105" height="36" rx="18" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.4"/>
    <text x="801" y="301" text-anchor="middle">Gen AI</text>
  </g>

  <g font-family="'Cascadia Code','Fira Code',monospace" font-size="15" fill="#f59e0b">
    <rect x="878" y="278" width="130" height="36" rx="18" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-opacity="0.4"/>
    <text x="943" y="301" text-anchor="middle">LangChain</text>
  </g>

  <text x="700" y="355" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#64748b">🚀 Currently Building AI Automation Platforms @ Virtue Analytics</text>

  <!-- Data pipeline accent: Raw Data -> Power BI -> AI, horizontal strip below the card -->
  <g opacity="0.9">
    <path
      d="M 160 448 L 1240 448"
      fill="none"
      stroke="url(#pipeGrad)"
      stroke-width="2.2"
      stroke-dasharray="1 8"
      stroke-linecap="round">
      <animate
        attributeName="stroke-dashoffset"
        from="0"
        to="-180"
        dur="6s"
        repeatCount="indefinite"/>
    </path>

    <!-- Raw Data -->
    <g transform="translate(160,435)">
      <circle r="13" fill="#0d1b33" stroke="#2dd4bf" stroke-width="2"/>
      <circle r="4" fill="#2dd4bf"/>
    </g>
    <text x="160" y="472" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#94a3b8">Raw Data</text>

    <!-- Power BI -->
    <g transform="translate(700,435)">
      <circle r="14" fill="#0d1b33" stroke="#38bdf8" stroke-width="2"/>
      <rect x="-5" y="-2" width="3" height="7" fill="#38bdf8"/>
      <rect x="-0.5" y="-6" width="3" height="11" fill="#38bdf8"/>
      <rect x="4" y="0" width="3" height="5" fill="#38bdf8"/>
    </g>
    <text x="700" y="472" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#94a3b8">Power BI</text>

    <!-- AI -->
    <g transform="translate(1240,435)">
      <circle r="15" fill="#0d1b33" stroke="#8b5cf6" stroke-width="2"/>
      <circle r="5" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
      <circle cx="0" cy="-5" r="1.5" fill="#c4b5fd">
        <animateTransform
          attributeName="transform"
          type="rotate"
          from="0 0 0"
          to="360 0 0"
          dur="4s"
          repeatCount="indefinite"/>
      </circle>
    </g>
    <text x="1240" y="472" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#94a3b8">AI</text>

    <!-- Moving dot, drawn last, glow built from plain layered circles (no filter dependency) -->
    <circle r="14" fill="#38bdf8" opacity="0.18">
      <animateMotion
        dur="6s"
        repeatCount="indefinite"
        path="M 210 448 L 1190 448"/>
    </circle>
    <circle r="9" fill="#7dd3fc" opacity="0.4">
      <animateMotion
        dur="6s"
        repeatCount="indefinite"
        path="M 210 448 L 1190 448"/>
    </circle>
    <circle r="6" fill="#f0f9ff" opacity="1">
      <animateMotion
        dur="6s"
        repeatCount="indefinite"
        path="M 210 448 L 1190 448"/>
    </circle>
  </g>
</svg>
