<svg width="1400" height="360" viewBox="0 0 1400 360" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="45%" stop-color="#0a1226"/>
      <stop offset="100%" stop-color="#0d1b33"/>
    </linearGradient>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2f4ff"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#7dd3fc" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1400" height="360" fill="url(#bgGrad)"/>
  <rect width="1400" height="360" fill="url(#grid)"/>
  <circle cx="1180" cy="90" r="220" fill="url(#glow)"/>
  <circle cx="160" cy="300" r="180" fill="url(#glow)"/>

  <!-- signature data pipeline motif: raw data -> Power BI -> AI automation -->
  <g opacity="0.9">
    <path d="M 90 300 C 300 220, 420 220, 560 190 S 900 130, 1310 95" fill="none" stroke="url(#pipeGrad)" stroke-width="2" stroke-dasharray="1 9" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" from="0" to="-200" dur="6s" repeatCount="indefinite"/>
    </path>
    <circle r="5" fill="#7dd3fc">
      <animateMotion dur="6s" repeatCount="indefinite" path="M 90 300 C 300 220, 420 220, 560 190 S 900 130, 1310 95"/>
    </circle>

    <g transform="translate(90,300)">
      <circle r="14" fill="#0d1b33" stroke="#2dd4bf" stroke-width="2"/>
      <circle r="4" fill="#2dd4bf"/>
    </g>
    <g transform="translate(560,190)">
      <circle r="16" fill="#0d1b33" stroke="#38bdf8" stroke-width="2"/>
      <rect x="-6" y="-2" width="3" height="8" fill="#38bdf8"/>
      <rect x="-1" y="-6" width="3" height="12" fill="#38bdf8"/>
      <rect x="4" y="0" width="3" height="6" fill="#38bdf8"/>
    </g>
    <g transform="translate(1310,95)">
      <circle r="18" fill="#0d1b33" stroke="#8b5cf6" stroke-width="2"/>
      <circle r="6" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
      <circle cx="0" cy="-6" r="1.6" fill="#c4b5fd">
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="4s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- glass panel -->
  <rect x="80" y="60" width="620" height="240" rx="22" fill="#ffffff" fill-opacity="0.035" stroke="#7dd3fc" stroke-opacity="0.28" stroke-width="1.2"/>
  <rect x="80" y="60" width="620" height="2" rx="1" fill="#7dd3fc" fill-opacity="0.5"/>

  <text x="112" y="150" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="700" fill="url(#nameGrad)">Hemant Kumar</text>

  <text x="114" y="192" font-family="'Segoe UI', Arial, sans-serif" font-size="19" fill="#94a3b8" letter-spacing="0.5">Data &amp; Business Analyst  •  AI Automation Engineer</text>

  <g font-family="'Cascadia Code','Fira Code',monospace" font-size="15" fill="#2dd4bf">
    <rect x="112" y="216" width="168" height="30" rx="15" fill="#2dd4bf" fill-opacity="0.1" stroke="#2dd4bf" stroke-opacity="0.4"/>
    <text x="130" y="236">Python · SQL</text>
  </g>
  <g font-family="'Cascadia Code','Fira Code',monospace" font-size="15" fill="#38bdf8">
    <rect x="290" y="216" width="150" height="30" rx="15" fill="#38bdf8" fill-opacity="0.1" stroke="#38bdf8" stroke-opacity="0.4"/>
    <text x="308" y="236">Power BI</text>
  </g>
  <g font-family="'Cascadia Code','Fira Code',monospace" font-size="15" fill="#8b5cf6">
    <rect x="450" y="216" width="150" height="30" rx="15" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.4"/>
    <text x="468" y="236">Gen AI</text>
  </g>

  <text x="114" y="278" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#64748b">Currently building intelligent automation @ Virtue Analytics</text>
</svg>
