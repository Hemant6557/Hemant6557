  <g font-family="'Cascadia Code','Fira Code',monospace" font-size="11" fill="#a78bfa">
    <rect x="24" y="150" width="70" height="24" rx="12" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-opacity="0.35"/>
