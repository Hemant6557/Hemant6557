<svg width="320" height="200" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1226"/>
      <stop offset="100%" stop-color="#1a1033"/>
    </linearGradient>
    <radialGradient id="iGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" rx="18" fill="url(#iBg)"/>
  <rect x="1" y="1" width="318" height="198" rx="17" fill="none" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1.2"/>

  <text x="24" y="34" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">AI and Automation</text>
  <text x="24" y="54" font-family="'Cascadia Code','Fira Code',monospace" font-size="11" fill="#64748b">LangChain · Claude/OpenAI API · n8n · OCR</text>

  <circle cx="245" cy="125" r="55" fill="url(#iGlow)"/>

  <g transform="translate(245,125)">
    <circle r="20" fill="#0d1b33" stroke="#8b5cf6" stroke-width="2"/>
