<svg width="320" height="200" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1226"/>
      <stop offset="100%" stop-color="#0d1b33"/>
    </linearGradient>
    <linearGradient id="aBar" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" rx="18" fill="url(#aBg)"/>
  <rect x="1" y="1" width="318" height="198" rx="17" fill="none" stroke="#2dd4bf" stroke-opacity="0.3" stroke-width="1.2"/>

  <text x="24" y="34" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">Analytics and Data</text>
  <text x="24" y="54" font-family="'Cascadia Code','Fira Code',monospace" font-size="11" fill="#64748b">Python · SQL · ETL · KPI Tracking</text>

  <g>
    <rect x="30" y="150" width="26" height="20" rx="3" fill="url(#aBar)" fill-opacity="0.55">
      <animate attributeName="height" values="20;60;20" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="150;110;150" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="70" y="130" width="26" height="40" rx="3" fill="url(#aBar)" fill-opacity="0.7">
      <animate attributeName="height" values="40;90;40" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="y" values="130;80;130" dur="2.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="110" y="100" width="26" height="70" rx="3" fill="url(#aBar)">
      <animate attributeName="height" values="70;110;70" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="100;60;100" dur="3.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="150" y="115" width="26" height="55" rx="3" fill="url(#aBar)" fill-opacity="0.8">
      <animate attributeName="height" values="55;95;55" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="115;75;115" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>

  <polyline points="190,160 215,120 240,140 265,90 290,105" fill="none" stroke="#7dd3fc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="290" cy="105" r="4" fill="#7dd3fc">
    <animate attributeName="r" values="4;6;4" dur="1.6s" repeatCount="indefinite"/>
  </circle>
</svg>
