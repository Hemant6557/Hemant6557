<svg width="1300" height="320" viewBox="0 0 1300 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060a14"/>
      <stop offset="100%" stop-color="#0d1b33"/>
    </linearGradient>
    <linearGradient id="tLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="55%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <pattern id="tgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7dd3fc" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <radialGradient id="cometGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="1"/>
      <stop offset="40%" stop-color="#7dd3fc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1300" height="320" rx="20" fill="url(#tBg)"/>
  <rect width="1300" height="320" rx="20" fill="url(#tgrid)"/>
  <rect x="1" y="1" width="1298" height="318" rx="19" fill="none" stroke="#7dd3fc" stroke-opacity="0.15" stroke-width="1.2"/>

  <text x="44" y="46" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#e2e8f0">Professional Timeline</text>
  <line x1="44" y1="64" x2="1256" y2="64" stroke="#27354d" stroke-width="1.5"/>

  <!-- base connector -->
  <line x1="140" y1="180" x2="1100" y2="180" stroke="url(#tLine)" stroke-width="3" stroke-linecap="round"/>

  <!-- flowing energy dashes along the path, showing progression -->
  <line x1="140" y1="180" x2="1100" y2="180" stroke="#e0f2fe" stroke-opacity="0.7" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 22">
    <animate attributeName="stroke-dashoffset" from="0" to="-480" dur="16s" repeatCount="indefinite"/>
  </line>

  <!-- traveling comet showing the career path advancing -->
  <g>
    <circle r="10" fill="url(#cometGlow)">
      <animateMotion path="M140,180 L1100,180" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.5" fill="#f0f9ff">
      <animateMotion path="M140,180 L1100,180" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Node 1: House of Tantu (centered label) -->
  <g transform="translate(140,180)">
    <rect x="-14" y="-14" width="28" height="28" rx="7" fill="#0d1b33" stroke="#2dd4bf" stroke-width="3" transform="rotate(45)"/>
    <rect x="-6" y="-6" width="12" height="12" rx="2.5" fill="#2dd4bf" transform="rotate(45)"/>
    <rect x="-75" y="-58" width="150" height="28" rx="14" fill="#2dd4bf" fill-opacity="0.12" stroke="#2dd4bf" stroke-opacity="0.4" stroke-width="1"/>
    <text x="0" y="-39" text-anchor="middle" font-family="'Cascadia Code','Fira Code',monospace" font-size="12.5" fill="#5eead4">2021 – 2023</text>
    <text x="0" y="44" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">Data Consultant</text>
    <text x="0" y="66" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#5eead4">House of Tantu</text>
  </g>

  <!-- Node 2: Beyond Algo (centered label) -->
  <g transform="translate(620,180)">
    <rect x="-14" y="-14" width="28" height="28" rx="7" fill="#0d1b33" stroke="#38bdf8" stroke-width="3" transform="rotate(45)"/>
    <rect x="-6" y="-6" width="12" height="12" rx="2.5" fill="#38bdf8" transform="rotate(45)"/>
    <rect x="-75" y="-58" width="150" height="28" rx="14" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1"/>
    <text x="0" y="-39" text-anchor="middle" font-family="'Cascadia Code','Fira Code',monospace" font-size="12.5" fill="#7dd3fc">2023 – 2025</text>
    <text x="0" y="44" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">Data Analyst</text>
    <text x="0" y="66" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#7dd3fc">Beyond Algo</text>
  </g>

  <!-- Node 3: Virtue Analytics (current, highlighted, centered label) -->
  <g transform="translate(1100,180)">
    <rect x="-24" y="-24" width="48" height="48" rx="11" fill="#8b5cf6" fill-opacity="0.15" transform="rotate(45)">
      <animate attributeName="fill-opacity" values="0.28;0.08;0.28" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="-15" y="-15" width="30" height="30" rx="7" fill="#0d1b33" stroke="#8b5cf6" stroke-width="3.5" transform="rotate(45)"/>
    <rect x="-6" y="-6" width="12" height="12" rx="2.5" fill="#c4b5fd" transform="rotate(45)"/>
    <rect x="-98" y="-64" width="196" height="30" rx="15" fill="#8b5cf6" fill-opacity="0.18" stroke="#a78bfa" stroke-opacity="0.6" stroke-width="1.2"/>
    <text x="0" y="-44" text-anchor="middle" font-family="'Cascadia Code','Fira Code',monospace" font-size="13" font-weight="700" fill="#c4b5fd">02/2025 – Present</text>
    <text x="0" y="48" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="19" font-weight="700" fill="#f8fafc">Data and Business Analyst</text>
    <text x="0" y="70" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14.5" font-weight="700" fill="#c4b5fd">Virtue Analytics</text>
  </g>
</svg>
