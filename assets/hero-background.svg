<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060a14"/>
      <stop offset="100%" stop-color="#0d1b33"/>
    </linearGradient>
    <linearGradient id="hpipe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.5"/>
    </linearGradient>
    <pattern id="hgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7dd3fc" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <radialGradient id="hglow" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="280" rx="24" fill="url(#hbg)"/>
  <rect width="1200" height="280" rx="24" fill="url(#hgrid)"/>
  <rect width="1200" height="280" rx="24" fill="url(#hglow)"/>
  <rect x="1" y="1" width="1198" height="278" rx="23" fill="none" stroke="#7dd3fc" stroke-opacity="0.18" stroke-width="1.5"/>

  <path d="M -20 210 C 250 150, 500 260, 760 170 S 1150 60, 1230 40" fill="none" stroke="url(#hpipe)" stroke-width="1.5" stroke-dasharray="1 8">
    <animate attributeName="stroke-dashoffset" from="0" to="-180" dur="7s" repeatCount="indefinite"/>
  </path>

  <g opacity="0.7">
    <circle cx="140" cy="60" r="2" fill="#38bdf8"/>
    <circle cx="220" cy="45" r="1.5" fill="#7dd3fc"/>
    <circle cx="1020" cy="220" r="2" fill="#8b5cf6"/>
    <circle cx="1080" cy="200" r="1.5" fill="#2dd4bf"/>
    <circle cx="960" cy="55" r="1.5" fill="#7dd3fc"/>
  </g>
