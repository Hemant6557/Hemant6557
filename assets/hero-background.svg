<svg width="1200" height="460" viewBox="0 0 1200 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060a14"/>
      <stop offset="100%" stop-color="#0d1b33"/>
    </linearGradient>
    <linearGradient id="hpipe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.5"/>
    </linearGradient>
    <pattern id="hgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7dd3fc" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <radialGradient id="hglow" cx="20%" cy="15%" r="60%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="460" rx="24" fill="url(#hbg)"/>
  <rect width="1200" height="460" rx="24" fill="url(#hgrid)"/>
  <rect width="1200" height="460" rx="24" fill="url(#hglow)"/>
  <rect x="1" y="1" width="1198" height="458" rx="23" fill="none" stroke="#7dd3fc" stroke-opacity="0.18" stroke-width="1.5"/>

  <path d="M -20 90 C 250 40, 500 130, 760 60 S 1150 -20, 1230 -40" fill="none" stroke="url(#hpipe)" stroke-width="1.5" stroke-dasharray="1 8">
    <animate attributeName="stroke-dashoffset" from="0" to="-180" dur="7s" repeatCount="indefinite"/>
  </path>

  <g opacity="0.7">
    <circle cx="140" cy="50" r="2" fill="#38bdf8"/>
    <circle cx="220" cy="35" r="1.5" fill="#7dd3fc"/>
    <circle cx="1020" cy="70" r="2" fill="#8b5cf6"/>
    <circle cx="1080" cy="55" r="1.5" fill="#2dd4bf"/>
    <circle cx="960" cy="30" r="1.5" fill="#7dd3fc"/>
  </g>

  <text x="48" y="140" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" fill="#e2e8f0">
    <tspan x="48" dy="0" font-weight="700">Business and Data Analyst with 4+ years of experience turning complex, multi-source data into</tspan>
    <tspan x="48" dy="26" font-weight="700">measurable outcomes across EdTech and FinTech.</tspan>
    <tspan x="48" dy="26" font-weight="400" fill="#b6c2d9">I've shipped Power BI dashboards, ETL pipelines, predictive models, and AI-powered automation tools</tspan>
    <tspan x="48" dy="26" font-weight="400" fill="#b6c2d9">end-to-end — from requirements gathering through production — and I'm now focused on pushing further</tspan>
    <tspan x="48" dy="26" font-weight="400" fill="#b6c2d9">into AI automation and agentic systems.</tspan>

    <tspan x="48" dy="44" font-weight="400" fill="#b6c2d9">I work at the intersection of business analysis and applied AI — turning ambiguous stakeholder asks</tspan>
    <tspan x="48" dy="26" font-weight="400" fill="#b6c2d9">into structured requirements, then building the dashboards, pipelines, and automation that make the</tspan>
    <tspan x="48" dy="26" font-weight="400" fill="#b6c2d9">resulting decisions repeatable. I've partnered with non-technical founders and enterprise clients</tspan>
    <tspan x="48" dy="26" font-weight="400" fill="#b6c2d9">alike, carrying projects from BRD through production, and I care as much about adoption as I do</tspan>
    <tspan x="48" dy="26" font-weight="400" fill="#b6c2d9">about the model or dashboard itself. Lately that means shipping production AI agents and OCR</tspan>
    <tspan x="48" dy="26" font-weight="400" fill="#b6c2d9">pipelines that remove manual work from Sales, HR, and Marketing workflows, and going deeper on</tspan>
    <tspan x="48" dy="26" font-weight="400" fill="#b6c2d9">LangChain and agentic system design.</tspan>
  </text>
</svg>
