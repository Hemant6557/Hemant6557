<svg width="1200" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060a14"/>
      <stop offset="100%" stop-color="#0d1b33"/>
    </linearGradient>
    <linearGradient id="hpipe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.5"/>
    </linearGradient>
    <pattern id="hgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7dd3fc" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <radialGradient id="hglow" cx="80%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="200" rx="24" fill="url(#hbg)"/>
  <rect width="1200" height="200" rx="24" fill="url(#hgrid)"/>
  <rect width="1200" height="200" rx="24" fill="url(#hglow)"/>
  <rect x="1" y="1" width="1198" height="198" rx="23" fill="none" stroke="#7dd3fc" stroke-opacity="0.18" stroke-width="1.5"/>

  <path d="M 780 -20 C 900 15, 950 -10, 1060 20 S 1180 10, 1240 35" fill="none" stroke="url(#hpipe)" stroke-width="1.5" stroke-dasharray="1 8">
    <animate attributeName="stroke-dashoffset" from="0" to="-180" dur="7s" repeatCount="indefinite"/>
  </path>
  <g opacity="0.7">
    <circle cx="860" cy="18" r="1.5" fill="#7dd3fc"/>
    <circle cx="1020" cy="14" r="2" fill="#8b5cf6"/>
    <circle cx="1080" cy="32" r="1.5" fill="#2dd4bf"/>
    <circle cx="980" cy="40" r="1.5" fill="#7dd3fc"/>
  </g>

  <text x="48" y="52" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="18">
    <tspan x="48" dy="0" font-weight="700" fill="#e2e8f0">Business and Data Analyst with 4+ years of experience turning complex, multi-source data into measurable outcomes</tspan>
<tspan x="48" dy="27" font-weight="700" fill="#e2e8f0">across EdTech and FinTech.</tspan>
<tspan x="48" dy="27" font-weight="400" fill="#b6c2d9">I've shipped Power BI dashboards, ETL pipelines, predictive models, and AI-powered automation tools end-to-end — from</tspan>
<tspan x="48" dy="27" font-weight="400" fill="#b6c2d9">requirements gathering through production — and I'm now focused on pushing further into AI automation and agentic</tspan>
<tspan x="48" dy="27" font-weight="400" fill="#b6c2d9">systems.</tspan>
  </text>
</svg>
